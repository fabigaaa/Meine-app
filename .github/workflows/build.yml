name: Build & Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Windows (.exe) ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Web-App exportieren (Expo)
        env:
          CI: "false"
          NODE_ENV: production
        run: npx expo export --platform web

      - name: Prüfen ob dist/ existiert
        run: |
          if (Test-Path "dist") {
            Write-Host "dist/ gefunden"
            Get-ChildItem dist | Select-Object -First 10
          } else {
            Write-Error "dist/ nicht gefunden!"
            exit 1
          }
        shell: pwsh

      - name: Windows .exe bauen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.json --publish always

  # ── macOS (.dmg) ─────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Web-App exportieren (Expo)
        env:
          CI: "false"
          NODE_ENV: production
        run: npx expo export --platform web

      - name: Prüfen ob dist/ existiert
        run: ls -la dist/ || (echo "dist/ nicht gefunden!" && exit 1)

      - name: macOS .dmg bauen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --config electron-builder.json --publish always
